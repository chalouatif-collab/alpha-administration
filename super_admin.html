<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Core - Super Admin</title>
    <!-- استدعاء Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        /* إخفاء شريط التمرير (Scrollbar) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ألوان السوبر أدمن المخصصة: أزرق داكن */
        body { background-color: #040a18; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .bg-card-blue { background-color: #0a162d; }
        .border-blue-custom { border-color: #172a4f !important; }
        
        /* حقول الإدخال */
        .input-blue { background-color: #040a18; border: 1px solid #172a4f; color: #bfdbfe; }
        .input-blue:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25); color: #fff;}
        .input-blue::placeholder { color: rgba(59, 130, 246, 0.5); }
        
        /* ألوان مخصصة للنصوص */
        .text-emerald-custom { color: #34d399 !important; }
        .text-blue-custom { color: #60a5fa !important; }
        
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 position-relative">
    
    <!-- حاوية الإشعارات -->
    <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1090; max-width: 350px; width: 100%;"></div>

    <!-- القائمة الجانبية (Offcanvas) -->
    <div class="offcanvas offcanvas-start bg-card-blue border-end border-blue-custom text-white" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
        <div class="offcanvas-header border-bottom border-blue-custom mb-3">
            <h5 class="offcanvas-title text-blue-custom fw-black" id="mobileSidebarLabel">ALPHA SUPER</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-3">
            <nav class="d-flex flex-column gap-2 flex-grow-1">
                <button class="btn text-start text-info fw-bold w-100" style="background-color: #172a4f; border: 1px solid #233f75;">👑 الشبكة (Admins)</button>
                <button class="btn text-start text-secondary fw-bold w-100 hover-bg-dark">🎰 سجل الكازينو</button>
                <button class="btn text-start text-secondary fw-bold w-100 hover-bg-dark">💸 سجل التحويلات</button>
                <button class="btn text-start text-secondary fw-bold w-100 hover-bg-dark">📊 المعاملات</button>
                <button class="btn text-start text-secondary fw-bold w-100 hover-bg-dark">⚽ التذاكر الحالية</button>
            </nav>
            <button onclick="logout()" class="btn btn-outline-danger w-100 mt-auto fw-bold">🚪 تسجيل الخروج</button>
        </div>
    </div>

    <!-- الهيدر العلوي -->
    <header class="bg-card-blue border-bottom border-blue-custom px-3 py-2 d-flex justify-content-between align-items-center shadow-sm sticky-top">
        <div class="d-flex align-items-center gap-2">
            <!-- زر القائمة متوافق تماماً مع Bootstrap -->
            <button class="btn btn-outline-secondary border-0 text-white px-2 py-1 fs-4" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar">
                ☰
            </button>
            <span class="badge bg-transparent border border-primary text-info fw-bold px-2 py-1" id="owner-username">Super Admin</span>
        </div>
        <div class="border border-blue-custom px-2 py-1 rounded d-flex align-items-center gap-2" style="background-color: #040a18;">
            <span class="text-secondary" style="font-size: 0.65rem;">الرصيد:</span>
            <span class="text-emerald-custom fw-bold font-monospace" style="font-size: 0.8rem;" id="sadmin-balance-val">0.00 TND</span>
        </div>
    </header>

    <!-- مساحة العمل الرئيسية -->
    <main class="flex-grow-1 p-3 mx-auto w-100" style="max-width: 800px;">
        
        <div class="d-flex flex-column gap-4">
            <!-- حقل البحث -->
            <div class="bg-card-blue rounded border border-blue-custom shadow-sm d-flex align-items-center p-2">
                <span class="ms-2">🔍</span>
                <input type="text" id="search-input" oninput="filterAdmins()" placeholder="بحث عن أدمن في الشبكة..." class="form-control border-0 bg-transparent text-white shadow-none" dir="rtl" style="font-size: 0.85rem;">
            </div>

            <!-- إنشاء حساب أدمن جديد -->
            <section class="bg-card-blue border border-blue-custom rounded p-3 shadow-sm">
                <h6 class="fw-bold text-white mb-3" dir="rtl">👑 إنشاء حساب أدمن جديد</h6>
                <div class="row g-2 mb-3">
                    <div class="col-12 col-md-6">
                        <input type="text" id="new-user-name" placeholder="Nom d'utilisateur" class="form-control input-blue font-monospace">
                    </div>
                    <div class="col-12 col-md-6">
                        <input type="password" id="new-user-pass" placeholder="Mot de passe" class="form-control input-blue font-monospace">
                    </div>
                </div>
                <button onclick="createAdminUser()" class="btn btn-success w-100 fw-bold">تثبيت الحساب</button>
            </section>

            <!-- المعاملات المالية والبرمجية -->
            <section id="financial-card" class="bg-card-blue border border-blue-custom rounded p-3 shadow-sm">
                <h6 class="fw-bold text-white mb-3" dir="rtl">📋 المعاملات المالية والبرمجية</h6>
                
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <input type="text" id="target-action-user" readonly placeholder="حدد أدمناً" class="form-control input-blue text-center text-info fw-bold" dir="rtl">
                    </div>
                    <div class="col-6">
                        <input type="number" id="target-action-amount" placeholder="المبلغ" class="form-control input-blue text-center font-monospace" dir="rtl">
                    </div>
                </div>
                
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <button onclick="executeAction('charge')" class="btn btn-success w-100 fw-bold">شحن</button>
                    </div>
                    <div class="col-6">
                        <button onclick="executeAction('withdraw')" class="btn btn-danger w-100 fw-bold">سحب</button>
                    </div>
                </div>

                <!-- التحكم في السحب (RTP) والحظر -->
                <div class="d-flex align-items-center gap-2 border border-blue-custom rounded p-2 mb-3" style="background-color: #040a18;">
                    <span class="text-info font-monospace" style="font-size: 0.75rem; width: 60px;">RTP:<span id="rtp-val-label" class="ms-1 text-white">50%</span></span>
                    <input type="range" class="form-range flex-grow-1" id="ctrl-rtp-range" min="1" max="99" value="50" oninput="document.getElementById('rtp-val-label').innerText = this.value + '%'">
                    <button onclick="saveRtpAndBlock(0)" class="btn btn-sm btn-primary fw-bold px-2">حفظ</button>
                    <button onclick="saveRtpAndBlock(1)" class="btn btn-sm btn-danger fw-bold px-2">حظر</button>
                </div>

                <div class="d-flex gap-2 pt-3 border-top border-blue-custom">
                    <input type="password" id="ctrl-admin-new-pass" placeholder="كلمة سر جديدة" class="form-control input-blue font-monospace" dir="rtl">
                    <button onclick="changeAdminPasswordFromSadmin()" class="btn btn-info fw-bold px-4">تغيير</button>
                </div>
            </section>

            <!-- قائمة الأدمنز (كروت) -->
            <div id="owner-network-list" class="d-flex flex-column gap-2 pb-5">
                <!-- سيتم ملء هذه المنطقة تلقائياً -->
                <div class="text-center p-4 text-info" style="font-size: 0.85rem;">جاري تحميل الشبكة...</div>
            </div>
        </div>

    </main>

    <script>
        const BACKEND_URL = "https://alpha-core-fl0v.onrender.com";
        let user = JSON.parse(localStorage.getItem('alpha_user')) || { username: 'fethi_sadmin', role: 'super_admin' };
        let allAdmins = [];

        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        window.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('owner-username');
            if(el) el.innerText = user.username;
            loadNetworkData();
        });

        // دالة الإشعارات متوافقة مع تصميم Bootstrap Toasts
        function showNotification(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toastEl = document.createElement('div');
            toastEl.className = `toast align-items-center text-white border-0 mb-2 show ${type === 'success' ? 'bg-success' : 'bg-danger'}`;
            toastEl.setAttribute('role', 'alert');
            toastEl.setAttribute('aria-live', 'assertive');
            toastEl.setAttribute('aria-atomic', 'true');
            
            toastEl.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body fw-bold" style="font-size: 0.85rem;">
                        ${type === 'success' ? '✅' : '❌'} ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            `;
            container.appendChild(toastEl);
            setTimeout(() => { toastEl.remove(); }, 3500);
        }

        async function loadNetworkData() {
            try {
                const uRes = await fetch(`${BACKEND_URL}/api/admin/users`, {
                    method: 'GET',
                    headers: getAuthHeaders()
                });
                if(uRes.ok){
                    const users = await uRes.json();
                    const me = users.find(u => u.username === user.username);
                    if(me) {
                        user.balance = me.balance;
                        document.getElementById('sadmin-balance-val').innerText = `${parseFloat(user.balance).toFixed(2)} TND`;
                        localStorage.setItem('alpha_user', JSON.stringify(user));
                    }
                    allAdmins = users.filter(u => u.role === 'admin' && u.created_by === user.username);
                    renderAdminsList(allAdmins);
                }
            } catch(e){
                document.getElementById('owner-network-list').innerHTML = `<div class="text-center p-4 text-danger" style="font-size: 0.85rem;">خطأ في الاتصال ❌</div>`;
            }
        }

        function renderAdminsList(adminsArray) {
            const listContainer = document.getElementById('owner-network-list'); 
            if(!listContainer) return;
            listContainer.innerHTML = '';
            
            if(adminsArray.length === 0) {
                listContainer.innerHTML = `<div class="bg-card-blue border border-blue-custom p-3 rounded text-center text-info fw-bold" style="font-size: 0.8rem;">لا يوجد أدمنز حتى الآن.</div>`;
                return;
            }

            adminsArray.forEach(u => {
                const userRole = u.role ? u.role.toUpperCase() : 'ADMIN';
                const userRtp = u.rtp !== undefined && u.rtp !== null ? u.rtp : 50;
                const userBalance = u.balance !== undefined && u.balance !== null ? parseFloat(u.balance).toFixed(2) : "0.00";
                const statusDot = u.is_blocked === 1 ? 'bg-danger' : 'bg-success';

                listContainer.innerHTML += `
                    <div class="card bg-card-blue border-blue-custom cursor-pointer" onclick="selectForControl('${u.username}', ${userRtp})">
                        <div class="card-body p-3 d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <div class="position-relative p-2 rounded-circle border border-secondary" style="background-color: #040a18;">
                                    👤
                                    <span class="position-absolute top-0 start-100 translate-middle p-1 ${statusDot} border border-dark rounded-circle"></span>
                                </div>
                                <div>
                                    <div class="text-white fw-bold mb-1" style="font-size: 0.9rem;">${u.username}</div>
                                    <div class="text-info fw-bold" style="font-size: 0.65rem;">${userRole} | RTP: ${userRtp}%</div>
                                </div>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <span class="text-emerald-custom fw-bold font-monospace" style="font-size: 0.85rem;">${userBalance} TND</span>
                                <div class="badge bg-success bg-opacity-25 text-success border border-success p-2">➡️</div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterAdmins() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allAdmins.filter(admin => admin.username.toLowerCase().includes(query));
            renderAdminsList(filtered);
        }

        function selectForControl(username, rtp) {
            document.getElementById('target-action-user').value = username;
            document.getElementById('ctrl-rtp-range').value = rtp;
            document.getElementById('rtp-val-label').innerText = rtp + '%';
            document.getElementById('financial-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
            showNotification(`تم تحديد: ${username}`);
        }

        async function executeAction(action) {
            const target_username = document.getElementById('target-action-user').value;
            const amountInput = document.getElementById('target-action-amount').value;
            if(!target_username) return showNotification('الرجاء اختيار أدمن من القائمة بالأسفل!', 'error');
            const amount = amountInput ? parseFloat(amountInput) : 0;
            if(amount <= 0) return showNotification('الرجاء إدخال مبلغ صحيح!', 'error');

            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/update-balance`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ admin_username: user.username, target_username, action, amount })
                });
                if(res.ok) { 
                    showNotification('تمت العملية بنجاح!'); 
                    document.getElementById('target-action-amount').value = ''; 
                    await loadNetworkData(); 
                } else { showNotification('فشلت العملية', 'error'); }
            } catch(e) { showNotification('خطأ في الاتصال', 'error'); }
        }

        async function createAdminUser() {
            const usernameInput = document.getElementById('new-user-name');
            const passwordInput = document.getElementById('new-user-pass');
            const username = usernameInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            if(!username || !password) return showNotification('الرجاء ملء جميع الحقول!', 'error');

            try {
                const res = await fetch(`${BACKEND_URL}/api/register`, {
                    method: 'POST',
                    headers: getAuthHeaders(), 
                    body: JSON.stringify({ username, password, role: "admin", created_by: user.username })
                });
                if(res.ok){ 
                    showNotification('تم إنشاء حساب الأدمن بنجاح!'); 
                    usernameInput.value = '';
                    passwordInput.value = '';
                    await loadNetworkData(); 
                } else { showNotification('فشل الإنشاء', 'error'); }
            } catch(e) { showNotification('خطأ في الاتصال', 'error'); }
        }

        async function saveRtpAndBlock(blockStatus) {
            const target_username = document.getElementById('target-action-user').value;
            const rtp = parseInt(document.getElementById('ctrl-rtp-range').value);
            if(!target_username) return showNotification('الرجاء تحديد حساب أولاً!', 'error');
            
            const res = await fetch(`${BACKEND_URL}/api/admin/configure-account`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({ admin_username: user.username, target_username, rtp, is_blocked: blockStatus })
            });
            if(res.ok) { 
                showNotification(blockStatus === 1 ? 'تم حظر الحساب' : 'تم حفظ الإعدادات'); 
                loadNetworkData(); 
            }
        }

        async function changeAdminPasswordFromSadmin() {
            const target = document.getElementById('target-action-user').value;
            const newPassword = document.getElementById('ctrl-admin-new-pass').value;
            if(!target || !newPassword || newPassword.length < 4) return showNotification('بيانات غير صحيحة', 'error');
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/change-player-password`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ admin_username: user.username, target_username: target, new_password: newPassword })
                });
                if(res.ok) {
                    showNotification(`تم تغيير كلمة السر بنجاح!`);
                    document.getElementById('ctrl-admin-new-pass').value = '';
                } else { showNotification('فشلت العملية', 'error'); }
            } catch(e) { showNotification('خطأ في الاتصال', 'error'); }
        }

        function logout() { 
            localStorage.removeItem('alpha_user'); 
            localStorage.clear(); 
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>

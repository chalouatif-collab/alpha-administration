<script>
        const BACKEND_URL = "https://alpha-core-fl0v.onrender.com";
        let user = JSON.parse(localStorage.getItem('alpha_user')) || { username: 'fethi' };

        // ... (تأكد من بقاء دوال الإدارة الأخرى كما هي)

        // 🚀 الإصلاح الجذري لدالة الجلب والمزامنة
        async function fetchAndOpenHistory(type) {
            const modal = document.getElementById('history-modal');
            const title = document.getElementById('modal-title');
            const headers = document.getElementById('modal-table-headers');
            const body = document.getElementById('modal-table-body');
            
            const target_username = document.getElementById('ctrl-target-user').value.trim().toLowerCase();
            
            title.innerText = "Historique de " + type.toUpperCase();
            body.innerHTML = '<tr><td colspan="4" class="p-4 text-center">Chargement...</td></tr>';
            modal.style.display = 'flex';

            if (type === 'sport') {
                if(!target_username) {
                    body.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-rose-500">Sélectionnez un joueur dans la console d'abord !</td></tr>`;
                    return;
                }
                
                // تحديث الـ Headers لتناسب البيانات الجديدة
                headers.innerHTML = `<th class="p-2">Ref / Date</th><th class="p-2">Matchs & Choix</th><th class="p-2 text-center">Cote / Mise</th><th class="p-2 text-right">Statut / Gain</th>`;
                
                try {
                    const res = await fetch(`${BACKEND_URL}/api/admin/get-player-tickets?username=${encodeURIComponent(target_username)}`);
                    const tickets = await res.json();
                    
                    body.innerHTML = '';
                    if (Array.isArray(tickets) && tickets.length > 0) {
                        tickets.forEach(t => {
                            let badgeColor = t.status === "gagne" ? "text-emerald-400 font-black" : (t.status === "perdu" ? "text-rose-400" : "text-cyan-400");
                            
                            // معالجة آمنة لمصفوفة المباريات
                            let matchesHtml = Array.isArray(t.details_list) ? 
                                t.details_list.map(g => `• ${g.matchName} (<span class="text-amber-400">${g.outcome}</span>)`).join('<br>') : "Match Inconnu";

                            body.innerHTML += `
                                <tr class="border-b border-slate-800/40 hover:bg-slate-800/30">
                                    <td class="p-2 text-slate-400 text-xs">#${t.ticket_id}<br><span class="text-[10px]">${t.date || ''}</span></td>
                                    <td class="p-2 text-white font-sans text-xs">${matchesHtml}</td>
                                    <td class="p-2 text-center font-mono">X${parseFloat(t.total_cote).toFixed(2)}<br><span class="text-slate-400">${parseFloat(t.mise).toFixed(2)} TND</span></td>
                                    <td class="p-2 text-right font-mono font-bold ${badgeColor}">${t.status.toUpperCase()}<br><span>+${parseFloat(t.gain).toFixed(2)} TND</span></td>
                                </tr>`;
                        });
                    } else {
                        body.innerHTML = `<tr><td colspan="4" class="p-2 text-center text-slate-500">Aucune feuille trouvée pour ${target_username}</td></tr>`;
                    }
                } catch(e) { body.innerHTML = `<tr><td colspan="4" class="p-2 text-center text-rose-500">Erreur serveur</td></tr>`; }
            } else {
                // ... (بقية الأقسام)
            }
        }
        
        // ... (بقية الدوال)
    </script>
</body>
</html>

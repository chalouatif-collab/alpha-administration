<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Core - Owner Control Centre</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 relative">
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- الجزء الخاص بالهيدر والقوائم يبقى كما هو[cite: 8] -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 rounded-xl flex justify-between items-center mb-6 shadow-xl">
        <h1 class="text-xl font-black text-rose-500 tracking-wider">ALPHA <span class="text-white font-light">OWNER CONTROL</span></h1>
        <div class="flex items-center gap-4">
            <span class="text-sm bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg border border-rose-500/20 font-bold" id="badge-role">Super Owner</span>
            <span class="font-bold text-slate-300" id="owner-username">fethi</span>
        </div>
    </header>

    <!-- ... (نفس هيكل القوائم والجدول السابق) ... -->
    <!-- (يرجى الاحتفاظ بهيكل الجدول والقوائم من الكود القديم لضمان التصميم) -->

    <script>
        const BACKEND_URL = "https://alpha-core-fl0v.onrender.com";
        // ... (بقية الدوال كما هي)

        // 🚀 الإصلاح الجذري لدالة الجلب (تأكد من استخدام هذا الجزء تحديداً)
        async function fetchAndOpenHistory(type) {
            const modal = document.getElementById('history-modal');
            const title = document.getElementById('modal-title');
            const headers = document.getElementById('modal-table-headers');
            const body = document.getElementById('modal-table-body');
            
            // التأكد من جلب اسم اللاعب بوضوح وبدون مسافات
            const target_username = document.getElementById('ctrl-target-user').value.trim().toLowerCase();
            
            title.innerText = "Historique de " + type.toUpperCase();
            body.innerHTML = '';

            if (type === 'sport') {
                if(!target_username || target_username === "sélectionnez...") {
                    showNotification("Veuillez sélectionner un joueur !", "error");
                    return;
                }
                
                headers.innerHTML = `<th class="p-2">Ref</th><th class="p-2">Matchs</th><th class="p-2">Mise</th><th class="p-2">Statut</th>`;
                
                try {
                    // الربط المباشر مع المسار المحدث في السيرفر
                    const res = await fetch(`${BACKEND_URL}/api/admin/get-player-tickets?username=${encodeURIComponent(target_username)}`);
                    const tickets = await res.json();
                    
                    if (Array.isArray(tickets) && tickets.length > 0) {
                        tickets.forEach(t => {
                            let matches = "Sport Game";
                            if(t.details_list && t.details_list.length > 0) {
                                matches = t.details_list.map(g => g.matchName).join(' / ');
                            }
                            body.innerHTML += `
                                <tr class="border-b border-slate-800">
                                    <td class="p-2">${t.ticket_id}</td>
                                    <td class="p-2">${matches}</td>
                                    <td class="p-2">${t.mise} TND</td>
                                    <td class="p-2 font-bold">${t.status.toUpperCase()}</td>
                                </tr>`;
                        });
                    } else {
                        body.innerHTML = `<tr><td colspan="4" class="p-4 text-center">Aucune feuille trouvée pour ${target_username}</td></tr>`;
                    }
                } catch(e) {
                    body.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-rose-500">Erreur serveur: ${e.message}</td></tr>`;
                }
            } else {
                body.innerHTML = `<tr><td class="p-4 text-center">Section en attente...</td></tr>`;
            }
            modal.style.display = 'flex';
        }
        
        // ... (بقية الدوال)
    </script>
</body>
</html>

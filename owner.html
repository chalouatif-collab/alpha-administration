<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Core - Owner Control Centre</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 relative">
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- [الجزء العلوي وباقي التصميم يبقى كما هو دون تغيير] -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 rounded-xl flex justify-between items-center mb-6 shadow-xl">
        <h1 class="text-xl font-black text-rose-500 tracking-wider">ALPHA <span class="text-white font-light">OWNER CONTROL</span></h1>
        <div class="flex items-center gap-4">
            <span class="text-sm bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg border border-rose-500/20 font-bold" id="badge-role">Super Owner</span>
            <span class="font-bold text-slate-300" id="owner-username">fethi</span>
        </div>
    </header>

    <!-- [نفس هيكل الجدول والقوائم السابق] -->
    <!-- [تم دمج التعديل داخل سكربت الجافاسكريبت أدناه] -->

    <script>
        const BACKEND_URL = "https://alpha-core-fl0v.onrender.com";
        // ... (بقية دوال اللوحة كما هي)

        // 🚀 هذا هو التعديل الجوهري المصلح لجلب وعرض الأوراق
        async function fetchAndOpenHistory(type) {
            const modal = document.getElementById('history-modal');
            const title = document.getElementById('modal-title');
            const headers = document.getElementById('modal-table-headers');
            const body = document.getElementById('modal-table-body');
            
            const target_username = document.getElementById('ctrl-target-user').value.trim().toLowerCase();
            
            title.innerText = "Historique de " + type.toUpperCase();
            body.innerHTML = '';

            // عند اختيار قسم Sport، نقوم بجلب الأوراق الحية من السيرفر
            if (type === 'sport') {
                if(!target_username) {
                    showNotification("Veuillez sélectionner un joueur d'abord", "error");
                    return;
                }
                
                headers.innerHTML = `<th class="p-2">Ref / Date</th><th class="p-2">Matchs</th><th class="p-2 text-center">Cote / Mise</th><th class="p-2 text-right">Statut / Gain</th>`;
                
                try {
                    const res = await fetch(`${BACKEND_URL}/api/admin/get-player-tickets?username=${target_username}`);
                    if (res.ok) {
                        const tickets = await res.json();
                        if (tickets && tickets.length > 0) {
                            tickets.forEach(t => {
                                let statusClass = "text-cyan-400";
                                if (t.status === "gagne") statusClass = "text-emerald-400 font-bold";
                                if (t.status === "perdu") statusClass = "text-rose-400";
                                if (t.status === "cashout") statusClass = "text-purple-400";

                                // بناء نصوص المباريات
                                let games = Array.isArray(t.details_list) ? t.details_list.map(g => g.matchName).join(', ') : "Match";

                                body.innerHTML += `
                                    <tr class="border-b border-slate-800">
                                        <td class="p-2 text-[10px] text-slate-500">#${t.ticket_id}<br>${t.date}</td>
                                        <td class="p-2 text-white">${games}</td>
                                        <td class="p-2 text-center">X${parseFloat(t.total_cote).toFixed(2)}<br>${parseFloat(t.mise).toFixed(2)} TND</td>
                                        <td class="p-2 text-right ${statusClass}">${t.status.toUpperCase()}<br>+${parseFloat(t.gain).toFixed(2)} TND</td>
                                    </tr>`;
                            });
                        } else {
                            body.innerHTML = `<tr><td class="p-4 text-center" colspan="4">Aucun pari enregistré pour ce joueur.</td></tr>`;
                        }
                    }
                } catch(e) { showNotification("Erreur serveur lors du chargement", "error"); }
            } else {
                // بقية الأقسام (Casino, Transfert, Compte) كما كانت
                body.innerHTML = `<tr><td class="p-4 text-center">Section en cours de développement...</td></tr>`;
            }
            modal.style.display = 'flex';
        }

        // ... (بقية السكربت)
    </script>
</body>
</html>

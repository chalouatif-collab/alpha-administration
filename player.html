<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet - Player Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes spin-slot {
            0% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
            100% { transform: translateY(0); }
        }
        .slot-anim { animation: spin-slot 0.4s ease-in-out; }
        .active-menu-btn { background-color: #1e293b !important; color: #ffffff !important; border-radius: 12px; }
        .active-filter-btn { background-color: #14b8a6 !important; color: #050814 !important; }
        .active-sub-tab { border-color: #14b8a6 !important; color: #14b8a6 !important; background-color: rgba(20, 184, 166, 0.05); }
    </style>
</head>
<body class="bg-[#050814] text-slate-200 min-h-screen font-sans flex flex-col md:flex-row md:overflow-hidden relative">

    <!-- باقي المحتوى (كما هو في ملفك) -->

    <script>
        const BACKEND_URL = "https://alpha-core-fl0v.onrender.com";
        // ... (تأكد من وجود باقي الدوال)

        async function submitSportTicket() {
            if(!playerSession) { return openLoginModal(); }
            if(comboTicketMatchesList.length === 0) return;
            
            await refreshPlayerBalance(); 
            const stake = parseFloat(document.getElementById('ticket-stake-input').value) || 0;
            if(stake <= 0 || playerSession.balance < stake) return showNotification('رصيدك الحالي غير كافٍ !', 'error');

            const btn = document.getElementById('ticket-submit-btn');
            btn.disabled = true;

            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/update-balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_username: "System", target_username: playerSession.username, action: "withdraw", amount: stake })
                });

                if(res.ok) {
                    const data = await res.json();
                    playerSession.balance = data.balance;
                    document.getElementById('player-balance-val').innerText = `${parseFloat(playerSession.balance).toFixed(2)}`;
                    
                    const totalOdds = parseFloat(document.getElementById('ticket-total-odds').innerText);
                    
                    // التعديل الجديد: هيكل بيانات متوافق 100%
                    const betTicketObject = {
                        id: Math.floor(100000 + Math.random() * 900000),
                        status: "encours", 
                        gamesCount: comboTicketMatchesList.length,
                        detailsList: comboTicketMatchesList.map(m => ({ matchName: m.matchName, outcome: m.outcome, odds: m.odds })),
                        totalCote: totalOdds,
                        mise: stake,
                        gain: stake * totalOdds,
                        date: new Date().toLocaleTimeString('fr-FR')
                    };

                    const saveRes = await fetch(`${BACKEND_URL}/api/admin/save-ticket`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: playerSession.username,
                            ticket_data: betTicketObject
                        })
                    });

                    if (saveRes.ok) {
                        showNotification('Ticket synced with server database successfully');
                        myActiveBetsList.push(betTicketObject);
                        updateActiveBetsBadgeCount();
                        clearTicket();
                        maximizeTicket();
                    } else {
                        showNotification('Error syncing ticket to server', 'error');
                    }
                } else { showNotification('خطأ في معالجة رصيد السيرفر', 'error'); }
            } catch(e) { showNotification('خطأ شبكة مالي', 'error'); }
            btn.disabled = false;
        }

        // ... (بقية السكربت)
    </script>
</body>
</html>

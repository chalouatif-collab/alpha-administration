<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet - Player Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-menu-btn { background-color: #1e293b !important; color: #ffffff !important; border-radius: 12px; }
        .active-sub-tab { border-color: #14b8a6 !important; color: #14b8a6 !important; background-color: rgba(20, 184, 166, 0.05); }
        .crash-graph-grid { background-image: linear-gradient(rgba(30, 41, 59, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 41, 59, 0.2) 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-[#050814] text-slate-200 min-h-screen font-sans flex flex-col md:flex-row relative">

    <div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-sm px-4"></div>

    <aside id="main-sidebar" class="w-full md:w-64 bg-[#060914] p-4 flex flex-col md:h-screen shrink-0 border-b md:border-b-0 border-slate-800">
        <div class="flex items-center justify-between md:block">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-8 h-8 rounded-lg bg-[#14b8a6] flex items-center justify-center font-black text-slate-950 text-xs">A</div>
                <span class="text-lg font-black tracking-wider text-white">Alphabet</span>
            </div>
        </div>
        
        <nav class="space-y-1 text-sm font-bold text-slate-300 flex-1 overflow-x-hidden">
            <button onclick="switchSection('accueil')" class="w-full flex items-center gap-4 hover:bg-slate-900/60 p-3 rounded-xl transition-all text-left active-menu-btn"><span>🏠</span> <span>Accueil</span></button>
            <button onclick="switchSection('sport')" class="w-full flex items-center gap-4 hover:bg-slate-900/60 p-3 rounded-xl transition-all text-left"><span>🏆</span> <span>Sport</span></button>
            <button onclick="switchSection('paris')" class="w-full flex justify-between items-center hover:bg-slate-900/60 p-3 rounded-xl transition-all text-left">
                <div class="flex items-center gap-4"><span>📋</span> <span>Mes Paris</span></div>
                <span class="bg-[#eab308] text-slate-950 text-[10px] px-2 py-0.5 rounded-full font-black" id="my-bets-badge-count">0</span>
            </button>
            <button onclick="switchSection('casino')" class="w-full flex items-center gap-4 hover:bg-slate-900/60 p-3 rounded-xl transition-all text-left"><span>🎰</span> <span>Le casino</span></button>
            <button onclick="switchSection('crash')" class="w-full flex items-center gap-4 hover:bg-slate-900/60 p-3 rounded-xl transition-all text-left"><span>🚀</span> <span>Jeux de crash</span></button>
        </nav>
    </aside>

    <div id="main-content-area" class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-[#090f24] border-b border-slate-800 p-3 flex justify-between items-center shadow-md">
            <div class="flex items-center gap-2">
                <span class="text-[10px] bg-slate-800 px-2 py-1 rounded-lg font-mono font-bold" id="player-name-display">Visitor</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-[#050814] border border-slate-800 px-3 py-1 rounded-xl flex items-center gap-2 font-mono text-xs">
                    <span class="text-[#14b8a6] font-black" id="player-balance-val">0.00</span>
                </div>
                <button onclick="openLoginModal()" id="top-login-btn" class="bg-[#14b8a6] text-slate-950 text-[10px] font-black px-3 py-1.5 rounded-lg uppercase">Connexion</button>
                <button onclick="logoutPlayer()" id="top-logout-btn" class="bg-rose-600 text-white text-[10px] font-black px-3 py-1.5 rounded-lg hidden">Sortir</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6 no-scrollbar">
            <div id="pane-sport" class="player-view-section hidden">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-4" id="matches-list-container"></div>
                    <div id="main-ticket-slip" class="bg-[#090f24] border border-slate-800 rounded-2xl p-4 space-y-3 shadow-xl">
                        <div id="ticket-odds-box" class="space-y-2"></div>
                        </div>
                </div>
            </div>
            </main>
    </div>
    
    <script>
        // ... (نفس السكريبت السابق) ...
    </script>
</body>
</html>

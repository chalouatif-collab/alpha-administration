<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet - Player Control Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-menu-btn { background-color: #1e293b !important; color: #ffffff !important; border-radius: 12px; }
    </style>
</head>
<body class="bg-[#050814] text-slate-200 min-h-screen font-sans flex flex-col md:flex-row relative">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 w-full max-w-sm px-4"></div>

    <div id="player-login-modal" class="fixed inset-0 z-50 bg-black/80 hidden items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#0b1124] border border-slate-800 rounded-3xl p-6 shadow-2xl space-y-4">
            <h2 class="text-white font-black text-center">Connexion</h2>
            <input type="text" id="p-auth-username" placeholder="Username" class="w-full p-3 rounded-xl bg-[#050814] border border-slate-800 text-white">
            <input type="password" id="p-auth-password" placeholder="Password" class="w-full p-3 rounded-xl bg-[#050814] border border-slate-800 text-white">
            <button onclick="handlePlayerAuth()" class="w-full bg-teal-500 p-3 rounded-xl font-black text-slate-950">Valider</button>
        </div>
    </div>

    <aside id="main-sidebar" class="w-full md:w-64 bg-[#060914] p-4 shrink-0 border-b md:border-b-0 border-slate-800">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-8 h-8 rounded-lg bg-[#14b8a6] flex items-center justify-center font-black text-slate-950">A</div>
            <span class="text-lg font-black text-white">Alphabet</span>
        </div>
        <nav class="space-y-1 text-sm font-bold text-slate-300">
            <button onclick="switchSection('accueil')" class="w-full text-left p-3 hover:bg-slate-900 rounded-xl">🏠 Accueil</button>
            <button onclick="switchSection('sport')" class="w-full text-left p-3 hover:bg-slate-900 rounded-xl">🏆 Sport</button>
            <button onclick="switchSection('paris')" class="w-full text-left p-3 hover:bg-slate-900 rounded-xl">📋 Mes Paris</button>
            <button onclick="switchSection('crash')" class="w-full text-left p-3 hover:bg-slate-900 rounded-xl">🚀 Crash</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-6 no-scrollbar">
        <div id="pane-accueil" class="player-view-section">
            <h1 class="text-2xl font-black">Bienvenue sur Alphabet</h1>
        </div>
        <div id="pane-sport" class="player-view-section hidden">
            <div id="matches-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
        <div id="pane-paris" class="player-view-section hidden">
            <div id="my-bets-history-list" class="grid grid-cols-1 gap-4"></div>
        </div>
        <div id="pane-crash" class="player-view-section hidden">
            <h2 class="text-xl font-black">Alphabet Aviator</h2>
            <div id="crash-multiplier-display" class="text-4xl font-mono font-bold">1.00x</div>
            <button onclick="startCrashBetRound()" id="crash-action-btn" class="bg-teal-500 p-4 rounded-xl mt-4">Placer le Pari</button>
        </div>
    </main>

    <script>
        const BACKEND_URL = "https://alpha-core-fl0v.onrender.com";
        let playerSession = null;
        let myActiveBetsList = [];

        function switchSection(sectionId) {
            document.querySelectorAll('.player-view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`pane-${sectionId}`).classList.remove('hidden');
            if(sectionId === 'sport') loadLiveMatchesData();
        }

        async function handlePlayerAuth() {
            const username = document.getElementById('p-auth-username').value.trim().toLowerCase();
            const password = document.getElementById('p-auth-password').value;
            const res = await fetch(`${BACKEND_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if(res.ok) {
                playerSession = await res.json();
                localStorage.setItem('alpha_player_session', JSON.stringify(playerSession));
                document.getElementById('player-login-modal').style.display = 'none';
                document.getElementById('player-balance-val').innerText = playerSession.balance;
            }
        }

        async function loadLiveMatchesData() {
            const container = document.getElementById('matches-list-container');
            container.innerHTML = `<div class="text-center p-4">Chargement...</div>`;
            try {
                const res = await fetch(`${BACKEND_URL}/api/sports/live`);
                const matches = await res.json();
                container.innerHTML = matches.map(m => `
                    <div class="bg-[#090f24] p-4 rounded-xl border border-slate-800">
                        <div class="text-xs font-bold">${m.home_team} vs ${m.away_team}</div>
                        <button class="bg-teal-500 w-full mt-2 py-2 rounded-lg text-xs font-black">Parier</button>
                    </div>
                `).join('');
            } catch(e) { container.innerHTML = "Aucun match disponible."; }
        }

        function startCrashBetRound() {
            alert("Jeu Crash lancé!");
        }

        window.onload = () => {
            const saved = localStorage.getItem('alpha_player_session');
            if(saved) {
                playerSession = JSON.parse(saved);
                document.getElementById('player-balance-val').innerText = playerSession.balance;
            }
        };
    </script>
</body>
</html>
